apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-demo
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-demo
  template:
    metadata:
       labels: 
         app: devops-demo
    spec:
      containers:
      - name: devops-demo
        image: python:3.11-slim
        command: ["python", "-c", "while True: pass"]
        ports:
        - containerPort: 5000