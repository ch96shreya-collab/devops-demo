name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 
        uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest tests/ -v
    
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code 
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t devops-demo:${{github.sha}} .
      
      - name: Confirm image built
        run: docker images devops-demo



  
    
    